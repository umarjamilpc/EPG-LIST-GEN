name: Update Multi EPG (manual only)

# Filter-only: uses existing grabber-raw-guide + EPG_URLS (no iptv-org grab).
# Set secret EPG_GRABBER=false to ignore local grabber files.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-epg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install requests lxml

      - name: Run EPG filter + merge
        env:
          M3U_US: ${{ secrets.M3U_US }}
          EPG_URLS: ${{ secrets.EPG_URLS }}
          EPG_GRABBER: ${{ secrets.EPG_GRABBER }}
          EPG_USE_DEFAULTS: ${{ secrets.EPG_USE_DEFAULTS }}
        run: python update_epg.py

      - name: Commit and push (no amend / no force)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          date -u > last_run.txt
          # -A so deleted old EPG/report files are removed from the repo too
          git add -A epgs/ last_run.txt
          if git diff --staged --quiet; then
            echo "No EPG file changes to commit."
            exit 0
          fi
          git commit -m "Fresh EPG Update: $(date -u)"
          git pull --rebase --autostash origin main
          git push origin HEAD:main
