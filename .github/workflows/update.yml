name: Update Multi EPG

on:
  schedule:
    - cron: '0 */6 * * *'  # Runs every 6 hours
  workflow_dispatch:      # Allows you to run it manually

permissions:
  contents: write

jobs:
  update-epg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install requests lxml

      - name: Run EPG Scraper
        env:
          # ONE SECRET = ONE EPG FILE
          # Secret name: M3U_<FILENAME>   Value: m3u URL
          # Example: M3U_US -> epgs/us-epg.xml.gz
          M3U_US: ${{ secrets.M3U_US }}
          # Optional: extra EPG xml/xml.gz URLs (comma or newline separated)
          # Use this if your M3U has no url-tvg and default sources don't match ids
          EPG_URLS: ${{ secrets.EPG_URLS }}
          # M3U_HOME: ${{ secrets.M3U_HOME }}
          # M3U_SPORTS: ${{ secrets.M3U_SPORTS }}
          # M3U_KIDS: ${{ secrets.M3U_KIDS }}
        run: python update_epg.py

      - name: Commit and Force Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # This ensures there is ALWAYS a change to commit
          date -u > last_run.txt

          # Add all generated epgs and the heartbeat file
          git add epgs/*.gz last_run.txt

          # Commit using amend to keep the repo history from growing
          git commit --amend -m "Fresh EPG Update: $(date -u)" || git commit -m "Fresh EPG Update: $(date -u)"

          # Force push to overwrite the old files with the new ones
          git push --force
