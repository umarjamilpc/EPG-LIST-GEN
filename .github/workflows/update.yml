name: Update Multi EPG (manual only)

# Heavy build moved to build-us-epg.yml (daily).
# Keep this for optional manual filter-only runs.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-epg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install requests lxml

      - name: Run EPG Scraper
        env:
          M3U_US: ${{ secrets.M3U_US }}
          EPG_URLS: ${{ secrets.EPG_URLS }}
          EPG_USE_DEFAULTS: ${{ secrets.EPG_USE_DEFAULTS }}
        run: python update_epg.py

      - name: Commit and Force Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          date -u > last_run.txt
          git add epgs/*.gz last_run.txt
          git commit --amend -m "Fresh EPG Update: $(date -u)" || git commit -m "Fresh EPG Update: $(date -u)"
          git push --force
