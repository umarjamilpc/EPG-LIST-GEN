name: Build US EPG (iptv-org)

# Free-tier friendly: once daily + manual.
# Builds 2-day guides with batched site grabs, splits if >40MB, then filters by M3U.

on:
  schedule:
    - cron: '0 6 * * *'   # once daily 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-us-epg
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      NODE_OPTIONS: --max-old-space-size=1536
      EPG_DAYS: '2'
      EPG_MAX_CONNECTIONS: '2'
      M3U_US: ${{ secrets.M3U_US }}
      M3U_URL: ${{ secrets.M3U_US }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python deps
        run: pip install --upgrade pip requests lxml

      - name: Clone iptv-org/epg (shallow)
        run: |
          rm -rf iptv-org-epg
          git clone --depth 1 -b master https://github.com/iptv-org/epg.git iptv-org-epg

      - name: Install iptv-org/epg deps
        working-directory: iptv-org-epg
        run: npm install --no-fund --no-audit

      - name: Build filtered channels.xml from playlist
        run: python build_us_channels.py

      - name: Split channels by site
        run: python split_channels_by_site.py

      - name: Grab EPG by site (2 days, batched)
        run: |
          chmod +x run_batched_grab.sh
          ./run_batched_grab.sh

      - name: Publish guides (merge + split if large)
        run: python publish_guides.py

      - name: Filter playlist EPG (us-epg.xml.gz)
        env:
          M3U_US: ${{ secrets.M3U_US }}
          # Prefer local us-iptvorg-guide*.xml.gz; keep secret only as optional extras
          EPG_URLS: ${{ secrets.EPG_URLS }}
          EPG_USE_DEFAULTS: '0'
        run: python update_epg.py

      - name: Show output sizes
        run: |
          ls -lh epgs/*.gz || true
          du -h epgs/*.gz || true

      - name: Commit and Force Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          date -u > last_run.txt
          git add epgs/*.gz last_run.txt
          git commit --amend -m "Fresh EPG Update: $(date -u)" || git commit -m "Fresh EPG Update: $(date -u)"
          git push --force
